<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TYT Takip</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:#070910;color:#cdd9e5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

:root{
–bg:#070910;–s1:#0d1117;–s2:#111820;–s3:#161f2b;
–border:#1e2d3d;–border2:#253545;
–text:#cdd9e5;–muted:#5a7a8a;
–mat:#3ddc97;–tur:#ff5c6a;–sos:#ffb340;–fen:#58b4ff;
–accent:#3ddc97;
}

.topbar{
position:sticky;top:0;z-index:999;
background:#070910ee;
backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
border-bottom:1px solid var(–border);
display:flex;align-items:center;
padding:0 12px;height:52px;gap:4px;
overflow-x:auto;-webkit-overflow-scrolling:touch;
scrollbar-width:none;
}
.topbar::-webkit-scrollbar{display:none}
.logo{font-weight:900;font-size:1.1rem;color:var(–mat);letter-spacing:.1em;flex-shrink:0;margin-right:8px}

.tab{
flex-shrink:0;padding:6px 13px;border-radius:8px;
font-size:.75rem;font-weight:700;letter-spacing:.03em;
border:none;background:none;color:var(–muted);cursor:pointer;
transition:all .15s;white-space:nowrap;
}
.tab.on{background:var(–mat);color:#070910}
.tab:not(.on):active{background:var(–s3);color:var(–text)}

.page{display:none;padding:16px 14px 90px;max-width:960px;margin:0 auto}
.page.on{display:block}

.card{background:var(–s2);border:1px solid var(–border);border-radius:14px;padding:18px;margin-bottom:14px}
.section-title{font-size:.65rem;letter-spacing:.12em;color:var(–muted);text-transform:uppercase;font-weight:700;margin-bottom:14px}

.g4{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(min-width:600px){.g4{grid-template-columns:repeat(4,1fr)}}

.scard{background:var(–s2);border:1px solid var(–border);border-radius:14px;padding:16px;border-top:3px solid var(–c)}
.scard-label{font-size:.62rem;letter-spacing:.1em;color:var(–muted);text-transform:uppercase;margin-bottom:8px}
.scard-net{font-size:2.2rem;font-weight:900;color:var(–c);line-height:1;margin-bottom:4px}
.scard-avg{font-size:.72rem;color:var(–muted)}
.trend{display:inline-flex;align-items:center;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:6px}
.t-up{background:rgba(61,220,151,.12);color:#3ddc97}
.t-dn{background:rgba(255,92,106,.12);color:#ff5c6a}
.t-eq{background:rgba(90,122,138,.12);color:var(–muted)}

.total-box{background:linear-gradient(135deg,#0d1117,#161f2b);border:1px solid var(–border2);border-radius:16px;padding:20px;margin-bottom:14px}
.total-num{font-size:3rem;font-weight:900;color:var(–mat);line-height:1;margin-bottom:4px}
.total-lbl{font-size:.62rem;letter-spacing:.12em;color:var(–muted);text-transform:uppercase;margin-bottom:8px}
.prog-track{background:var(–border);border-radius:4px;height:5px;overflow:hidden;margin:8px 0 4px}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(–mat),var(–fen));transition:width .8s ease}
.prog-info{display:flex;justify-content:space-between;font-size:.72rem;color:var(–muted)}

.ch-wrap{position:relative}
.h140{height:140px}.h180{height:180px}.h220{height:220px}

.form-card{background:var(–s2);border:1px solid var(–border);border-radius:14px;padding:18px;margin-bottom:12px}
.form-lbl{font-size:.62rem;letter-spacing:.1em;color:var(–accent);text-transform:uppercase;font-weight:700;margin-bottom:14px}

.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
label{font-size:.68rem;letter-spacing:.06em;color:var(–muted);text-transform:uppercase;font-weight:600}

input,select,textarea{
background:var(–bg);border:1px solid var(–border);border-radius:8px;
color:var(–text);padding:10px 12px;
font-family:inherit;font-size:.88rem;outline:none;width:100%;
-webkit-appearance:none;transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(–accent)}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.4);cursor:pointer}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(max-width:360px){.g3{grid-template-columns:1fr 1fr}}

.subj-block{border:1px solid var(–border);border-radius:12px;padding:14px;background:var(–s1);border-left:3px solid var(–c);margin-bottom:12px}
.subj-block-title{font-size:.68rem;letter-spacing:.1em;color:var(–c);text-transform:uppercase;font-weight:700;margin-bottom:12px}
.net-row{display:flex;justify-content:space-between;align-items:center;background:var(–bg);border:1px solid var(–border);border-radius:8px;padding:9px 12px;margin-top:8px}
.net-row-lbl{font-size:.68rem;color:var(–muted);font-weight:600;letter-spacing:.06em}
.net-row-val{font-size:1.2rem;font-weight:900;color:var(–c)}

.btn{padding:11px 22px;border-radius:9px;font-size:.86rem;font-weight:700;border:none;cursor:pointer;transition:all .15s;letter-spacing:.04em;font-family:inherit}
.btn-p{background:var(–mat);color:#070910;box-shadow:0 4px 18px rgba(61,220,151,.2)}
.btn-p:active{transform:scale(.97)}
.btn-g{background:var(–s3);color:var(–muted);border:1px solid var(–border)}
.btn-d{background:rgba(255,92,106,.1);color:#ff5c6a;border:1px solid rgba(255,92,106,.2);padding:5px 10px;font-size:.7rem;border-radius:6px;cursor:pointer;font-family:inherit}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

.topic-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;background:var(–s1);border:1px solid var(–border);margin-bottom:6px;cursor:pointer;transition:border-color .15s;user-select:none}
.topic-item.done{opacity:.4}
.topic-item.done .t-name{text-decoration:line-through}
.t-cnt{font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0}
.t-name{font-size:.84rem;font-weight:500;flex:1}
.add-row{display:flex;gap:8px;margin-top:8px}
.add-row input{flex:1}
.add-btn{flex-shrink:0;background:transparent;border:1px solid var(–border);border-radius:8px;color:var(–muted);padding:10px 14px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit}

.goal-item{background:var(–s2);border:1px solid var(–border);border-radius:12px;padding:16px;margin-bottom:10px;border-left:3px solid var(–c)}
.goal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.goal-subj{font-size:.7rem;letter-spacing:.1em;color:var(–c);text-transform:uppercase;font-weight:700}
.goal-nums{font-size:.78rem;color:var(–muted)}
.goal-nums b{color:var(–text)}
.gbar-track{background:var(–border);border-radius:4px;height:6px;overflow:hidden}
.gbar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.goal-status{font-size:.7rem;color:var(–muted);margin-top:6px}

.sg4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:500px){.sg4{grid-template-columns:repeat(4,1fr)}}
.st-card{background:var(–s2);border:1px solid var(–border);border-radius:12px;padding:14px;border-left:3px solid var(–c);text-align:center}
.st-subj{font-size:.62rem;letter-spacing:.1em;color:var(–muted);text-transform:uppercase;margin-bottom:6px}
.st-total{font-size:1.6rem;font-weight:900;color:var(–c);line-height:1}
.st-unit{font-size:.68rem;color:var(–muted);margin-top:2px}

.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.78rem;min-width:360px}
th{text-align:left;color:var(–muted);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:0 8px 10px;font-weight:700;border-bottom:1px solid var(–border)}
td{padding:10px 8px;border-bottom:1px solid rgba(30,45,61,.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-weight:800;font-size:.8rem}

.empty{text-align:center;padding:36px 20px;color:var(–muted);font-size:.84rem}
.empty-icon{font-size:2rem;margin-bottom:8px;opacity:.3}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(–s2);border:1px solid var(–mat);border-radius:10px;padding:10px 20px;font-size:.82rem;color:var(–mat);font-weight:700;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.confetti-p{position:fixed;width:7px;height:7px;border-radius:2px;pointer-events:none;z-index:9998;animation:cf 1.4s ease-in forwards}
@keyframes cf{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>

</head>
<body>

<nav class="topbar">
  <span class="logo">TYT</span>
  <button class="tab on" data-page="dash">📊 Dashboard</button>
  <button class="tab" data-page="giris">➕ Giriş</button>
  <button class="tab" data-page="konular">❌ Konular</button>
  <button class="tab" data-page="hedef">🎯 Hedefler</button>
  <button class="tab" data-page="calisma">⏱️ Çalışma</button>
  <button class="tab" data-page="gecmis">📋 Geçmiş</button>
</nav>

<div class="page on" id="p-dash">
  <div class="total-box">
    <div class="total-lbl">Son Deneme Toplam Net</div>
    <div class="total-num" id="d-total">—</div>
    <div class="prog-info"><span>Hedefe İlerleme</span><span id="d-pct">—</span></div>
    <div class="prog-track"><div class="prog-fill" id="d-prog" style="width:0%"></div></div>
    <div style="font-size:.72rem;color:var(--muted)">Hedef: <span id="d-glbl">—</span> net</div>
  </div>
  <div class="g4" id="d-cards"></div>
  <div class="card">
    <div class="section-title">Net Gelişim — Tüm Dersler</div>
    <div class="ch-wrap h220"><canvas id="c-overview"></canvas></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div class="card">
      <div class="section-title">Son 7 Gün Çalışma</div>
      <div class="ch-wrap h140"><canvas id="c-study7"></canvas></div>
    </div>
    <div class="card">
      <div class="section-title">En Çok Yanlış</div>
      <div id="d-weaklist"></div>
    </div>
  </div>
</div>

<div class="page" id="p-giris">
  <div class="form-card">
    <div class="form-lbl">Deneme Bilgileri</div>
    <div class="g2">
      <div class="fg"><label>Tarih</label><input type="date" id="g-date"></div>
      <div class="fg"><label>Deneme Adı</label><input type="text" id="g-name" placeholder="Opsiyonel"></div>
    </div>
  </div>
  <div id="subj-forms"></div>
  <div class="form-card">
    <div class="form-lbl">⏱️ Çalışma Süreleri (dakika)</div>
    <div class="g2" id="study-inputs"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-p" onclick="saveEntry()">💾 Kaydet</button>
    <button class="btn btn-g" onclick="clearForm()">Temizle</button>
  </div>
</div>

<div class="page" id="p-konular">
  <div id="konular-wrap"></div>
</div>

<div class="page" id="p-hedef">
  <div class="form-card">
    <div class="form-lbl">Hedef Net Belirle</div>
    <div class="g2" id="goal-inputs"></div>
    <div class="btn-row"><button class="btn btn-p" onclick="saveGoals()">Kaydet</button></div>
  </div>
  <div id="goals-display"></div>
</div>

<div class="page" id="p-calisma">
  <div class="sg4" id="study-totals"></div>
  <div class="card">
    <div class="section-title">14 Günlük Çalışma (dakika)</div>
    <div class="ch-wrap h220"><canvas id="c-study14"></canvas></div>
  </div>
</div>

<div class="page" id="p-gecmis">
  <div class="card">
    <div class="tbl-wrap" id="hist-tbl"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const S=[
  {key:'mat',label:'Matematik',short:'Mat',c:'#3ddc97',dim:'rgba(61,220,151,.1)',max:40},
  {key:'tur',label:'Türkçe',short:'Tür',c:'#ff5c6a',dim:'rgba(255,92,106,.1)',max:40},
  {key:'sos',label:'Sosyal',short:'Sos',c:'#ffb340',dim:'rgba(255,179,64,.1)',max:20},
  {key:'fen',label:'Fen',short:'Fen',c:'#58b4ff',dim:'rgba(88,180,255,.1)',max:20},
];
const KEY='tyt_pro_v2';
const CH={};

function ld(){try{return JSON.parse(localStorage.getItem(KEY)||'null')||def();}catch(e){return def();}}
function def(){return{entries:[],topics:{mat:[],tur:[],sos:[],fen:[]},goals:{mat:25,tur:28,sos:12,fen:12},study:[]};}
function sv(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}}

// TABS
document.querySelectorAll('.tab').forEach(function(btn){
  btn.addEventListener('click',function(){
    var pg=btn.dataset.page;
    document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
    btn.classList.add('on');
    document.getElementById('p-'+pg).classList.add('on');
    if(pg==='dash')renderDash();
    if(pg==='konular')renderKonular();
    if(pg==='hedef')renderHedef();
    if(pg==='calisma')renderCalisma();
    if(pg==='gecmis')renderGecmis();
  });
});

function buildForms(){
  document.getElementById('g-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('subj-forms').innerHTML=S.map(function(s){return `
    <div class="subj-block" style="--c:${s.c}">
      <div class="subj-block-title">${s.label} <span style="opacity:.4;font-size:.58rem">(Max ${s.max})</span></div>
      <div class="g3">
        <div class="fg" style="margin:0"><label>Doğru</label><input type="number" id="${s.key}-d" min="0" max="${s.max}" placeholder="0" oninput="calcNet('${s.key}')"></div>
        <div class="fg" style="margin:0"><label>Yanlış</label><input type="number" id="${s.key}-y" min="0" max="${s.max}" placeholder="0" oninput="calcNet('${s.key}')"></div>
        <div class="fg" style="margin:0"><label>Boş</label><input type="number" id="${s.key}-b" min="0" max="${s.max}" placeholder="0"></div>
      </div>
      <div class="net-row" style="--c:${s.c}">
        <span class="net-row-lbl">NET</span>
        <span class="net-row-val" id="${s.key}-net">0.00</span>
      </div>
      <div style="margin-top:10px">
        <label style="display:block;margin-bottom:5px">Yanlış yaptığın konular</label>
        <textarea id="${s.key}-wrong" placeholder="Virgülle yaz: Problemler, Üslü Sayılar..." style="min-height:56px;resize:none;font-size:.82rem"></textarea>

```
  </div>
</div>`;}).join('');
```

document.getElementById(‘study-inputs’).innerHTML=S.map(function(s){return ` <div class="fg"><label style="color:${s.c}">${s.label}</label><input type="number" id="study-${s.key}" min="0" placeholder="0 dk"></div>`;}).join(’’);

var d=ld();
document.getElementById(‘goal-inputs’).innerHTML=S.map(function(s){return ` <div class="fg"><label style="color:${s.c}">${s.label}</label><input type="number" id="goal-${s.key}" min="0" max="${s.max}" value="${d.goals[s.key]||0}"></div>`;}).join(’’);
}

function calcNet(k){
var dv=+(document.getElementById(k+’-d’).value)||0;
var yv=+(document.getElementById(k+’-y’).value)||0;
document.getElementById(k+’-net’).textContent=(dv-yv/4).toFixed(2);
}

function clearForm(){
S.forEach(function(s){
[‘d’,‘y’,‘b’].forEach(function(f){document.getElementById(s.key+’-’+f).value=’’;});
document.getElementById(s.key+’-net’).textContent=‘0.00’;
document.getElementById(s.key+’-wrong’).value=’’;
document.getElementById(‘study-’+s.key).value=’’;
});
}

function saveEntry(){
var date=document.getElementById(‘g-date’).value;
var name=document.getElementById(‘g-name’).value.trim();
if(!date){toast(‘Tarih seç!’);return;}
var d=ld();
var entry={date:date,name:name,id:Date.now()};
S.forEach(function(s){
var dg=+(document.getElementById(s.key+’-d’).value)||0;
var yg=+(document.getElementById(s.key+’-y’).value)||0;
var bg=+(document.getElementById(s.key+’-b’).value)||0;
entry[s.key]={d:dg,y:yg,b:bg,net:+(dg-yg/4).toFixed(2)};
var wrong=document.getElementById(s.key+’-wrong’).value.trim();
if(wrong){
wrong.split(/[,،\n]+/).map(function(t){return t.trim();}).filter(Boolean).forEach(function(topic){
var ex=d.topics[s.key].find(function(t){return t.text.toLowerCase()===topic.toLowerCase();});
if(ex){ex.count=(ex.count||1)+1;}
else{d.topics[s.key].push({text:topic,count:1,done:false,id:Date.now()+Math.random()});}
});
}
var st=+(document.getElementById(‘study-’+s.key).value)||0;
if(st>0)d.study.push({date:date,subject:s.key,minutes:st});
});
d.entries.push(entry);
d.entries.sort(function(a,b){return a.date.localeCompare(b.date);});
sv(d);clearForm();toast(‘✓ Kaydedildi!’);
var total=S.reduce(function(a,s){return a+(entry[s.key]?entry[s.key].net:0);},0);
var tGoal=S.reduce(function(a,s){return a+(d.goals[s.key]||0);},0);
if(total>=tGoal)confetti();
}

function renderDash(){
var d=ld();var E=d.entries;var last=E[E.length-1];
var tGoal=S.reduce(function(a,s){return a+(d.goals[s.key]||0);},0);
document.getElementById(‘d-glbl’).textContent=tGoal;
if(last){
var total=S.reduce(function(a,s){return a+(last[s.key]?last[s.key].net:0);},0);
document.getElementById(‘d-total’).textContent=total.toFixed(1);
var pct=Math.min(100,Math.round(total/tGoal*100));
document.getElementById(‘d-pct’).textContent=’%’+pct;
document.getElementById(‘d-prog’).style.width=pct+’%’;
} else {
document.getElementById(‘d-total’).textContent=’—’;
document.getElementById(‘d-pct’).textContent=’—’;
}

document.getElementById(‘d-cards’).innerHTML=S.map(function(s){
var nets=E.map(function(e){return e[s.key]?e[s.key].net:null;}).filter(function(n){return n!=null;});
var ln=nets.length?nets[nets.length-1]:null;
var avg=nets.length?(nets.reduce(function(a,b){return a+b;},0)/nets.length).toFixed(1):null;
var prev=nets.length>1?nets[nets.length-2]:null;
var tr=’<span class="trend t-eq">— veri yok</span>’;
if(ln!==null&&prev!==null){
var diff=(ln-prev).toFixed(1);
tr=ln>prev?’<span class="trend t-up">↑ +’+diff+’</span>’:ln<prev?’<span class="trend t-dn">↓ ‘+diff+’</span>’:’<span class="trend t-eq">→ Sabit</span>’;
}
return ‘<div class="scard" style="--c:'+s.c+'"><div class="scard-label">’+s.label+’</div><div class="scard-net">’+(ln!==null?ln.toFixed(1):’—’)+’</div><div class="scard-avg">Ort: ‘+(avg||’—’)+’ / ‘+s.max+’</div>’+tr+’</div>’;
}).join(’’);

if(CH.ov)CH.ov.destroy();
var dates=[…new Set(E.map(function(e){return e.date;}))];
CH.ov=new Chart(document.getElementById(‘c-overview’),{
type:‘line’,
data:{labels:dates.map(fmtD),datasets:S.map(function(s){return{label:s.short,data:dates.map(function(dt){var e=E.find(function(x){return x.date===dt;});return e&&e[s.key]?e[s.key].net:null;}),borderColor:s.c,backgroundColor:‘transparent’,borderWidth:2,pointRadius:3,pointBackgroundColor:s.c,tension:.35,spanGaps:true};})},
options:cOpts()
});

if(CH.s7)CH.s7.destroy();
var l7=last7();
CH.s7=new Chart(document.getElementById(‘c-study7’),{
type:‘bar’,
data:{labels:l7.map(fmtD),datasets:S.map(function(s){return{label:s.short,data:l7.map(function(dt){return d.study.filter(function(x){return x.date===dt&&x.subject===s.key;}).reduce(function(a,b){return a+b.minutes;},0);}),backgroundColor:s.c+‘88’,borderRadius:3};})},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:’#5a7a8a’,font:{size:9},boxWidth:8}}},scales:{x:{stacked:true,ticks:{color:’#5a7a8a’,font:{size:8}},grid:{display:false}},y:{stacked:true,ticks:{color:’#5a7a8a’,font:{size:8}},grid:{color:’#1e2d3d’}}}}
});

var all=[];
S.forEach(function(s){d.topics[s.key].filter(function(t){return !t.done;}).forEach(function(t){all.push(Object.assign({},t,{s:s}));});});
all.sort(function(a,b){return (b.count||1)-(a.count||1);});
var top=all.slice(0,5);
document.getElementById(‘d-weaklist’).innerHTML=top.length
?top.map(function(t){return ‘<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)"><span style="width:7px;height:7px;border-radius:50%;background:'+t.s.c+';flex-shrink:0;display:inline-block"></span><span style="font-size:.82rem;flex:1">’+t.text+’</span><span style="font-size:.7rem;font-weight:700;color:'+t.s.c+'">’+(t.count||1)+‘x</span></div>’;}).join(’’)
:’<div class="empty" style="padding:16px;font-size:.8rem"><p>Henüz konu yok</p></div>’;
}

function renderKonular(){
document.getElementById(‘konular-wrap’).innerHTML=S.map(function(s){return ` <div style="margin-bottom:20px"> <div style="font-size:.65rem;letter-spacing:.1em;color:${s.c};text-transform:uppercase;font-weight:700;margin-bottom:10px">${s.label}</div> <div id="tlist-${s.key}"></div> <div class="add-row"> <input type="text" id="tinp-${s.key}" placeholder="Konu ekle..."> <button class="add-btn" style="color:${s.c}" onclick="addTopic('${s.key}')">+ Ekle</button> </div> </div>`;}).join(’’);
S.forEach(function(s){renderTopics(s.key);});
}

function renderTopics(k){
var d=ld();var s=S.find(function(x){return x.key===k;});
var el=document.getElementById(‘tlist-’+k);if(!el)return;
var sorted=[…d.topics[k]].sort(function(a,b){return (b.count||1)-(a.count||1);});
el.innerHTML=sorted.length
?sorted.map(function(t,i){return ‘<div class="topic-item'+(t.done?' done':'')+'" style="--c:'+s.c+'" onclick="toggleT(\''+k+'\','+i+')"><span class="t-cnt" style="background:'+s.c+'18;color:'+s.c+'">’+(t.count||1)+‘x</span><span class="t-name">’+t.text+’</span><span>’+(t.done?‘✓’:’’)+’</span><button class="btn-d" onclick="event.stopPropagation();deleteT(\''+k+'\','+i+')">✕</button></div>’;}).join(’’)
:’<div class="empty" style="padding:14px"><p>Henüz konu yok</p></div>’;
}

function addTopic(k){
var inp=document.getElementById(‘tinp-’+k);var text=inp.value.trim();if(!text)return;
var d=ld();var ex=d.topics[k].find(function(t){return t.text.toLowerCase()===text.toLowerCase();});
if(ex){ex.count=(ex.count||1)+1;}else{d.topics[k].push({text:text,count:1,done:false,id:Date.now()});}
inp.value=’’;sv(d);renderTopics(k);
}

function toggleT(k,i){
var d=ld();var sorted=[…d.topics[k]].sort(function(a,b){return (b.count||1)-(a.count||1);});
var item=d.topics[k].find(function(t){return t.id===sorted[i].id;});
if(item)item.done=!item.done;sv(d);renderTopics(k);
}

function deleteT(k,i){
var d=ld();var sorted=[…d.topics[k]].sort(function(a,b){return (b.count||1)-(a.count||1);});
d.topics[k]=d.topics[k].filter(function(t){return t.id!==sorted[i].id;});
sv(d);renderTopics(k);
}

function renderHedef(){
var d=ld();
document.getElementById(‘goals-display’).innerHTML=S.map(function(s){
var nets=d.entries.map(function(e){return e[s.key]?e[s.key].net:null;}).filter(function(n){return n!=null;});
var ln=nets.length?nets[nets.length-1]:0;
var g=d.goals[s.key]||0;
var pct=g>0?Math.min(100,Math.round(ln/g*100)):0;
return ‘<div class="goal-item" style="--c:'+s.c+'"><div class="goal-head"><span class="goal-subj">’+s.label+’</span><span class="goal-nums">Son: <b>’+(ln?ln.toFixed(1):’—’)+’</b> / Hedef: <b>’+g+’</b></span></div><div class="gbar-track"><div class="gbar-fill" style="width:'+pct+'%;background:'+s.c+'"></div></div><div class="goal-status">’+(pct>=100?‘🎉 Hedefe ulaştın!’:ln?‘Hedefe ‘+(g-ln).toFixed(1)+’ net kaldı (%’+pct+’)’:‘Henüz deneme yok’)+’</div></div>’;
}).join(’’);
}

function saveGoals(){
var d=ld();
S.forEach(function(s){d.goals[s.key]=+(document.getElementById(‘goal-’+s.key).value)||0;});
sv(d);toast(‘✓ Hedefler kaydedildi!’);renderHedef();
}

function renderCalisma(){
var d=ld();
document.getElementById(‘study-totals’).innerHTML=S.map(function(s){
var tot=d.study.filter(function(x){return x.subject===s.key;}).reduce(function(a,b){return a+b.minutes;},0);
var h=Math.floor(tot/60),m=tot%60;
return ‘<div class="st-card" style="--c:'+s.c+'"><div class="st-subj">’+s.label+’</div><div class="st-total">’+(h>0?h+‘s ‘:’’)+m+‘dk</div><div class="st-unit">Toplam</div></div>’;
}).join(’’);
if(CH.s14)CH.s14.destroy();
var l14=last14();
CH.s14=new Chart(document.getElementById(‘c-study14’),{
type:‘bar’,
data:{labels:l14.map(fmtD),datasets:S.map(function(s){return{label:s.label,data:l14.map(function(dt){return d.study.filter(function(x){return x.date===dt&&x.subject===s.key;}).reduce(function(a,b){return a+b.minutes;},0);}),backgroundColor:s.c+‘88’,borderRadius:4};})},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:’#5a7a8a’,font:{size:10},boxWidth:10}}},scales:{x:{stacked:true,ticks:{color:’#5a7a8a’,font:{size:9}},grid:{display:false}},y:{stacked:true,ticks:{color:’#5a7a8a’,font:{size:9},callback:function(v){return v+‘dk’;}},grid:{color:’#1e2d3d’}}}}
});
}

function renderGecmis(){
var d=ld();var E=[…d.entries].reverse();var el=document.getElementById(‘hist-tbl’);
if(!E.length){el.innerHTML=’<div class="empty"><div class="empty-icon">📭</div><p>Henüz deneme yok</p></div>’;return;}
el.innerHTML=’<table><thead><tr><th>Tarih</th>’+S.map(function(s){return ‘<th style="color:'+s.c+'">’+s.short+’</th>’;}).join(’’)+’<th>Top.</th><th></th></tr></thead><tbody>’+E.map(function(e){
var tot=S.reduce(function(a,s){return a+(e[s.key]?e[s.key].net:0);},0);
var pc=tot>=85?’#3ddc97’:tot>=60?’#ffb340’:’#ff5c6a’;
return ‘<tr><td><div style="font-size:.78rem">’+fmtD(e.date)+’</div>’+(e.name?’<div style="font-size:.68rem;color:var(--muted)">’+e.name+’</div>’:’’)+’</td>’+S.map(function(s){var n=e[s.key]?e[s.key].net:null;var c=n>=s.max*.7?’#3ddc97’:n>=s.max*.4?’#ffb340’:’#ff5c6a’;return ‘<td><span class="pill" style="background:'+c+'18;color:'+c+'">’+(n!=null?n.toFixed(1):’—’)+’</span></td>’;}).join(’’)+’<td><span class="pill" style="background:'+pc+'18;color:'+pc+'">’+tot.toFixed(1)+’</span></td><td><button class="btn-d" onclick="delEntry('+e.id+')">✕</button></td></tr>’;
}).join(’’)+’</tbody></table>’;
}

function delEntry(id){var d=ld();d.entries=d.entries.filter(function(e){return e.id!==id;});sv(d);renderGecmis();toast(‘Silindi’);}

function cOpts(){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:’#5a7a8a’,font:{size:10},boxWidth:10}}},scales:{x:{ticks:{color:’#5a7a8a’,font:{size:9}},grid:{color:’#1e2d3d’}},y:{min:0,ticks:{color:’#5a7a8a’,font:{size:9}},grid:{color:’#1e2d3d’}}}};}
function fmtD(dt){return new Date(dt+‘T12:00:00’).toLocaleDateString(‘tr-TR’,{day:‘2-digit’,month:‘short’});}
function last7(){var a=[];for(var i=6;i>=0;i–){var d=new Date();d.setDate(d.getDate()-i);a.push(d.toISOString().split(‘T’)[0]);}return a;}
function last14(){var a=[];for(var i=13;i>=0;i–){var d=new Date();d.setDate(d.getDate()-i);a.push(d.toISOString().split(‘T’)[0]);}return a;}

function toast(msg){var el=document.getElementById(‘toast’);el.textContent=msg;el.classList.add(‘show’);setTimeout(function(){el.classList.remove(‘show’);},2200);}
function confetti(){var cols=[’#3ddc97’,’#ff5c6a’,’#ffb340’,’#58b4ff’,’#fff’];for(var i=0;i<35;i++){(function(i){setTimeout(function(){var el=document.createElement(‘div’);el.className=‘confetti-p’;el.style.cssText=‘left:’+Math.random()*100+‘vw;top:-10px;background:’+cols[Math.floor(Math.random()*cols.length)]+’;animation-duration:’+(1+Math.random())+‘s’;document.body.appendChild(el);setTimeout(function(){el.remove();},1800);},i*45);})(i);}}

buildForms();
renderDash();
</script>

</body>
</html>
