<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYT Takip</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Karla:wght@300;400;500;600;700&display=swap');

:root {
–bg:      #070910;
–s1:      #0d1117;
–s2:      #111820;
–s3:      #161f2b;
–border:  #1e2d3d;
–border2: #253545;
–text:    #cdd9e5;
–muted:   #436070;
–mat:  #3ddc97;
–tur:  #ff5c6a;
–sos:  #ffb340;
–fen:  #58b4ff;
–accent: #3ddc97;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(–bg);color:var(–text);font-family:‘Karla’,sans-serif;min-height:100vh;overflow-x:hidden}

/* MOBILE NAV */
.topbar{
position:sticky;top:0;z-index:100;
background:rgba(7,9,16,0.95);
backdrop-filter:blur(12px);
border-bottom:1px solid var(–border);
padding:0 16px;
display:flex;align-items:center;
height:54px;gap:6px;
overflow-x:auto;-webkit-overflow-scrolling:touch;
scrollbar-width:none;
}
.topbar::-webkit-scrollbar{display:none}

.logo-txt{
font-family:‘Bebas Neue’,sans-serif;
font-size:1.3rem;letter-spacing:0.05em;
color:var(–mat);margin-right:10px;
flex-shrink:0;
}

.tab-btn{
flex-shrink:0;
padding:6px 14px;border-radius:6px;
font-family:‘Karla’,sans-serif;
font-size:0.78rem;font-weight:600;
border:1px solid transparent;
background:none;color:var(–muted);
cursor:pointer;transition:all 0.15s;
white-space:nowrap;letter-spacing:0.03em;
}
.tab-btn:hover{color:var(–text);background:var(–s3);}
.tab-btn.active{color:var(–bg);background:var(–accent);border-color:var(–accent);}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:20px 14px 80px;}

/* SECTIONS */
.sec{display:none;}
.sec.on{display:block;animation:fadeUp 0.2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* CARDS GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
@media(max-width:500px){.grid2{grid-template-columns:1fr;}}

/* CARD */
.card{
background:var(–s2);
border:1px solid var(–border);
border-radius:14px;
padding:18px;
}
.card-sm{padding:14px;}

/* SECTION TITLE */
.stitle{
font-family:‘Bebas Neue’,sans-serif;
font-size:1.4rem;letter-spacing:0.08em;
color:var(–text);margin-bottom:16px;
display:flex;align-items:center;gap:10px;
}
.stitle::before{content:’’;width:3px;height:22px;background:var(–accent);border-radius:2px;}

/* SUBJECT CARDS */
.subj-card{
background:var(–s2);border:1px solid var(–border);
border-radius:14px;padding:18px;
border-top:2px solid var(–color);
position:relative;overflow:hidden;
}
.subj-card::after{
content:’’;position:absolute;top:0;right:0;
width:60px;height:60px;
background:radial-gradient(circle at top right,var(–color-dim),transparent 70%);
}
.subj-label{font-size:0.65rem;letter-spacing:0.12em;color:var(–muted);text-transform:uppercase;margin-bottom:10px;}
.subj-net{font-family:‘Bebas Neue’,sans-serif;font-size:2.4rem;color:var(–color);line-height:1;margin-bottom:4px;}
.subj-avg{font-size:0.75rem;color:var(–muted);margin-bottom:8px;}
.subj-trend{display:inline-flex;align-items:center;gap:4px;font-size:0.7rem;font-weight:600;padding:2px 8px;border-radius:20px;}
.trend-up{background:rgba(61,220,151,0.1);color:#3ddc97;}
.trend-dn{background:rgba(255,92,106,0.1);color:#ff5c6a;}
.trend-eq{background:rgba(67,96,112,0.1);color:var(–muted);}

/* TOTAL BOX */
.total-box{
background:linear-gradient(135deg,var(–s1),var(–s3));
border:1px solid var(–border2);
border-radius:16px;padding:22px 24px;
display:flex;align-items:center;gap:20px;flex-wrap:wrap;
margin-bottom:20px;
}
.total-num{font-family:‘Bebas Neue’,sans-serif;font-size:3.5rem;color:var(–mat);line-height:1;}
.total-info{flex:1;min-width:140px;}
.total-label{font-size:0.65rem;letter-spacing:0.12em;color:var(–muted);text-transform:uppercase;margin-bottom:4px;}
.total-sub{font-size:0.75rem;color:var(–muted);margin-top:6px;}
.prog-track{background:var(–border);border-radius:4px;height:5px;overflow:hidden;margin-top:8px;}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(–mat),var(–fen));transition:width 0.8s cubic-bezier(.4,0,.2,1);}

/* CHART */
.chart-wrap{position:relative;}
.chart-wrap.h160{height:160px;}
.chart-wrap.h200{height:200px;}
.chart-wrap.h240{height:240px;}

/* FORM */
.form-block{
background:var(–s2);border:1px solid var(–border);
border-radius:16px;padding:22px;margin-bottom:16px;
}
.form-title{font-size:0.65rem;letter-spacing:0.12em;color:var(–accent);text-transform:uppercase;font-weight:700;margin-bottom:14px;}

.fg{display:flex;flex-direction:column;gap:5px;}
label{font-size:0.7rem;letter-spacing:0.06em;color:var(–muted);text-transform:uppercase;font-weight:600;}

input[type=date],input[type=time],input[type=number],input[type=text],select,textarea{
background:var(–bg);border:1px solid var(–border);border-radius:8px;
color:var(–text);padding:9px 12px;
font-family:‘Karla’,sans-serif;font-size:0.9rem;
outline:none;width:100%;transition:border-color 0.15s;
-webkit-appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(–accent);}
input[type=number]::-webkit-inner-spin-button{opacity:0.3;}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(0.4);cursor:pointer;}

.fields3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.fields2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:400px){.fields3{grid-template-columns:1fr 1fr;}}

.net-box{
background:var(–bg);border:1px solid var(–border);
border-radius:8px;padding:9px 12px;
display:flex;justify-content:space-between;align-items:center;
margin-top:10px;
}
.net-box-label{font-size:0.7rem;color:var(–muted);font-weight:600;letter-spacing:0.06em;}
.net-box-val{font-family:‘Bebas Neue’,sans-serif;font-size:1.3rem;color:var(–color,var(–mat));}

.subj-section{border:1px solid var(–border);border-radius:12px;padding:14px;background:var(–s1);border-left:3px solid var(–color);}
.subj-section-title{font-size:0.7rem;letter-spacing:0.1em;color:var(–color);text-transform:uppercase;font-weight:700;margin-bottom:12px;}

.wrong-topics-input{margin-top:10px;}
.wrong-topics-input textarea{min-height:60px;resize:none;font-size:0.82rem;line-height:1.5;}

.btn{
padding:10px 24px;border-radius:8px;
font-family:‘Karla’,sans-serif;font-size:0.88rem;font-weight:700;
border:none;cursor:pointer;transition:all 0.15s;
letter-spacing:0.04em;
}
.btn-primary{background:var(–mat);color:#070910;box-shadow:0 4px 20px rgba(61,220,151,0.2);}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
.btn-primary:active{transform:scale(0.98);}
.btn-ghost{background:var(–s3);color:var(–muted);border:1px solid var(–border);}
.btn-ghost:hover{color:var(–text);}
.btn-danger{background:rgba(255,92,106,0.1);color:#ff5c6a;border:1px solid rgba(255,92,106,0.2);padding:5px 10px;font-size:0.72rem;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}

/* TOPICS */
.topic-item{
display:flex;align-items:center;gap:10px;
padding:10px 12px;border-radius:8px;
background:var(–s1);border:1px solid var(–border);
margin-bottom:6px;cursor:pointer;
transition:border-color 0.15s;
user-select:none;
}
.topic-item:hover{border-color:var(–color,var(–accent));}
.topic-item.done{opacity:0.4;}
.topic-item.done .topic-name{text-decoration:line-through;}
.topic-count{
background:var(–color-dim,rgba(61,220,151,0.1));
color:var(–color,var(–mat));
font-size:0.7rem;font-weight:700;
padding:2px 7px;border-radius:20px;
flex-shrink:0;
}
.topic-name{font-size:0.85rem;font-weight:500;flex:1;}
.topic-check{color:var(–color,var(–mat));font-size:0.9rem;flex-shrink:0;}

/* STUDY TIMER */
.study-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.study-card{
background:var(–s2);border:1px solid var(–border);
border-radius:12px;padding:14px;
border-left:3px solid var(–color);
text-align:center;
}
.study-subject{font-size:0.65rem;letter-spacing:0.1em;color:var(–muted);text-transform:uppercase;margin-bottom:6px;}
.study-total{font-family:‘Bebas Neue’,sans-serif;font-size:1.8rem;color:var(–color);line-height:1;}
.study-unit{font-size:0.7rem;color:var(–muted);}

/* GOALS */
.goal-item{
background:var(–s2);border:1px solid var(–border);
border-radius:12px;padding:16px;margin-bottom:10px;
border-left:3px solid var(–color);
}
.goal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.goal-subject{font-size:0.75rem;letter-spacing:0.1em;color:var(–color);text-transform:uppercase;font-weight:700;}
.goal-nums{font-size:0.8rem;color:var(–muted);}
.goal-nums span{color:var(–text);font-weight:600;}
.goal-bar-track{background:var(–border);border-radius:4px;height:6px;overflow:hidden;}
.goal-bar-fill{height:100%;border-radius:4px;background:var(–color);transition:width 0.6s ease;}
.goal-status{font-size:0.72rem;color:var(–muted);margin-top:6px;}

/* HISTORY TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.8rem;}
th{text-align:left;color:var(–muted);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:0 8px 10px;font-weight:700;border-bottom:1px solid var(–border);}
td{padding:10px 8px;border-bottom:1px solid rgba(30,45,61,0.5);vertical-align:top;}
tr:hover td{background:rgba(255,255,255,0.01);}
tr:last-child td{border-bottom:none;}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-weight:700;font-family:‘Bebas Neue’,sans-serif;font-size:0.85rem;}
.pill-good{background:rgba(61,220,151,0.1);color:#3ddc97;}
.pill-ok{background:rgba(255,179,64,0.1);color:#ffb340;}
.pill-bad{background:rgba(255,92,106,0.1);color:#ff5c6a;}

.empty{text-align:center;padding:40px;color:var(–muted);font-size:0.85rem;}
.empty-icon{font-size:2rem;margin-bottom:8px;opacity:0.3;}

/* TOAST */
.toast{
position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
background:var(–s2);border:1px solid var(–mat);
border-radius:10px;padding:10px 20px;
font-size:0.82rem;color:var(–mat);font-weight:600;
opacity:0;transition:all 0.3s ease;z-index:999;
pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* CONFETTI */
.confetti-piece{
position:fixed;width:8px;height:8px;border-radius:2px;
pointer-events:none;z-index:9999;
animation:confettiFall 1.5s ease-in forwards;
}
@keyframes confettiFall{
0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
}

.mb16{margin-bottom:16px;}
.mb8{margin-bottom:8px;}
.mt8{margin-top:8px;}
</style>

</head>
<body>

<nav class="topbar">
  <span class="logo-txt">TYT</span>

<div class="form-block">

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const S = [
  {key:'mat',label:'Matematik',      short:'Mat', color:'#3ddc97',dim:'rgba(61,220,151,0.08)',  max:40},
  {key:'tur',label:'Türkçe',         short:'Tür', color:'#ff5c6a',dim:'rgba(255,92,106,0.08)',  max:40},
  {key:'sos',label:'Sosyal Bilimler',short:'Sos', color:'#ffb340',dim:'rgba(255,179,64,0.08)',  max:20},
  {key:'fen',label:'Fen Bilimleri',  short:'Fen', color:'#58b4ff',dim:'rgba(88,180,255,0.08)',  max:20},
];

const STORE = 'tyt_pro_v1';
const charts = {};

// ── DATA ────────────────────────────────────────────────────────────────────
function load(){
  try{ return JSON.parse(localStorage.getItem(STORE)||'null') || {
    entries:[], topics:{mat:[],tur:[],sos:[],fen:[]},
    goals:{mat:25,tur:28,sos:12,fen:12}, study:[]
  }; }catch(e){ return {entries:[],topics:{mat:[],tur:[],sos:[],fen:[]},goals:{mat:25,tur:28,sos:12,fen:12},study:[]}; }
}
function save(d){ try{localStorage.setItem(STORE,JSON.stringify(d));}catch(e){} }

// ── NAV ─────────────────────────────────────────────────────────────────────
function go(id, btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('on');
  if(btn) btn.classList.add('active');
  if(id==='dash') renderDash();
  if(id==='konular') renderKonular();
  if(id==='hedef') renderHedef();
  if(id==='calisma') renderCalisma();
  if(id==='gecmis') renderGecmis();
}

// ── BUILD FORMS ──────────────────────────────────────────────────────────────
function buildForms(){
  document.getElementById('g-date').value = new Date().toISOString().split('T')[0];

  // Subject forms
  document.getElementById('subj-forms').innerHTML = S.map(s=>`
    <div class="form-block">
      <div class="subj-section" style="--color:${s.color};--color-dim:${s.dim}">
        <div class="subj-section-title">${s.label} <span style="opacity:0.5;font-size:0.6rem">(Max ${s.max})</span></div>
        <div class="fields3">
          <div class="fg"><label>Doğru</label><input type="number" id="${s.key}-d" min="0" max="${s.max}" placeholder="0" oninput="calcNet('${s.key}')"></div>
          <div class="fg"><label>Yanlış</label><input type="number" id="${s.key}-y" min="0" max="${s.max}" placeholder="0" oninput="calcNet('${s.key}')"></div>
          <div class="fg"><label>Boş</label><input type="number" id="${s.key}-b" min="0" max="${s.max}" placeholder="0"></div>
        </div>
        <div class="net-box" style="--color:${s.color}">
          <span class="net-box-label">NET</span>
          <span class="net-box-val" id="${s.key}-net">0.00</span>
        </div>
        <div class="wrong-topics-input">
          <div style="font-size:0.65rem;letter-spacing:0.08em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;font-weight:600;">Bu denemede yanlış yaptığın konular</div>
          <textarea id="${s.key}-wrong" placeholder="Örn: Problemler, Üslü Sayılar, Paragraf..."></textarea>

```
    </div>
  </div>
</div>
```

`).join(’’);

// Study inputs
document.getElementById(‘study-inputs’).innerHTML = S.map(s=>`<div class="fg"> <label style="color:${s.color}">${s.label}</label> <input type="number" id="study-${s.key}" min="0" placeholder="0 dk"> </div>`).join(’’);

// Goal inputs
const d = load();
document.getElementById(‘goal-inputs’).innerHTML = S.map(s=>`<div class="fg"> <label style="color:${s.color}">${s.label} Hedef Net</label> <input type="number" id="goal-${s.key}" min="0" max="${s.max}" value="${d.goals[s.key]||0}"> </div>`).join(’’);
}

function calcNet(key){
const d = +document.getElementById(`${key}-d`).value||0;
const y = +document.getElementById(`${key}-y`).value||0;
document.getElementById(`${key}-net`).textContent = (d-y/4).toFixed(2);
}

function clearForm(){
S.forEach(s=>{
[‘d’,‘y’,‘b’].forEach(f=>{ document.getElementById(`${s.key}-${f}`).value=’’; });
document.getElementById(`${s.key}-net`).textContent=‘0.00’;
document.getElementById(`${s.key}-wrong`).value=’’;
document.getElementById(`study-${s.key}`).value=’’;
});
}

// ── SAVE ENTRY ───────────────────────────────────────────────────────────────
function saveEntry(){
const date = document.getElementById(‘g-date’).value;
const name = document.getElementById(‘g-name’).value.trim();
if(!date){ toast(‘Tarih seç!’); return; }

const d = load();
const entry = {date, name, id:Date.now()};

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDash(){
const d = load();
const entries = d.entries;
const last = entries[entries.length-1];

// Total net
if(last){
const total = S.reduce((acc,s)=>acc+(last[s.key]?.net||0),0);
document.getElementById(‘d-total’).textContent = total.toFixed(1);
const pct = Math.min(100,Math.round((total/totalGoal)*100));
document.getElementById(‘d-pct’).textContent = ‘%’+pct;
document.getElementById(‘d-prog’).style.width = pct+’%’;
} else {
document.getElementById(‘d-total’).textContent = ‘—’;
document.getElementById(‘d-pct’).textContent = ‘—’;
}
document.getElementById(‘d-target-label’).textContent = totalGoal;

// Subject cards
document.getElementById(‘d-cards’).innerHTML = S.map(s=>{
const nets = entries.map(e=>e[s.key]?.net).filter(n=>n!=null);
const lastNet = nets.length ? nets[nets.length-1] : null;
const avg = nets.length ? (nets.reduce((a,b)=>a+b,0)/nets.length) : null;
const prev = nets.length>1 ? nets[nets.length-2] : null;
let trend = `<span class="subj-trend trend-eq">— veri yok</span>`;
if(lastNet!==null && prev!==null){
const diff = (lastNet-prev).toFixed(1);
if(lastNet>prev) trend=`<span class="subj-trend trend-up">↑ +${diff}</span>`;
else if(lastNet<prev) trend=`<span class="subj-trend trend-dn">↓ ${diff}</span>`;
else trend=`<span class="subj-trend trend-eq">→ Sabit</span>`;
}
return `<div class="subj-card" style="--color:${s.color};--color-dim:${s.dim}"> <div class="subj-label">${s.label}</div> <div class="subj-net">${lastNet!==null?lastNet.toFixed(1):'—'}</div> <div class="subj-avg">Ort: ${avg!==null?avg.toFixed(1):'—'} · Max: ${s.max}</div> ${trend} </div>`;
}).join(’’);

// Overview chart
if(charts.overview) charts.overview.destroy();
const ctx = document.getElementById(‘d-overview’);
const allDates = […new Set(entries.map(e=>e.date))];
charts.overview = new Chart(ctx,{
type:‘line’,
data:{
labels: allDates.map(fmtDate),
datasets: S.map(s=>({
label:s.short,
data: allDates.map(dt=>{ const e=entries.find(x=>x.date===dt); return e?e[s.key]?.net:null; }),
borderColor:s.color,backgroundColor:‘transparent’,
borderWidth:2,pointRadius:3,pointBackgroundColor:s.color,
tension:0.35,spanGaps:true,
}))
},
options:{
responsive:true,maintainAspectRatio:false,
plugins:{legend:{labels:{color:’#436070’,font:{size:10,family:‘Karla’}}}},
scales:{
x:{ticks:{color:’#436070’,font:{size:9}},grid:{color:’#1e2d3d’}},
y:{min:0,ticks:{color:’#436070’,font:{size:9}},grid:{color:’#1e2d3d’}}
}
}
});

// Study mini chart

data:{

label:s.short,
data:last7.map(dt=>d.study.filter(x=>x.date===dt&&x.subject===s.key).reduce((a,b)=>a+b.minutes,0)),
backgroundColor:s.color+‘99’,borderRadius:4,
}))
},
options:{
responsive:true,maintainAspectRatio:false,
plugins:{legend:{labels:{color:’#436070’,font:{size:10}}}},
scales:{
x:{stacked:true,ticks:{color:’#436070’,font:{size:9}},grid:{display:false}},
y:{stacked:true,ticks:{color:’#436070’,font:{size:9}},grid:{color:’#1e2d3d’}}
}
}
});

// Weak topics mini list
const allTopics = [];
S.forEach(s=>{ d.topics[s.key].filter(t=>!t.done).forEach(t=>allTopics.push({…t,subject:s})); });
allTopics.sort((a,b)=>(b.count||1)-(a.count||1));

// ── KONULAR ──────────────────────────────────────────────────────────────────
function renderKonular(){
const d = load();
const el = document.getElementById(‘konular-content’);
el.innerHTML = S.map(s=>`<div style="margin-bottom:20px"> <div style="font-size:0.65rem;letter-spacing:0.12em;color:${s.color};text-transform:uppercase;font-weight:700;margin-bottom:10px">${s.label}</div> <div id="topics-${s.key}"></div> <div style="display:flex;gap:8px;margin-top:8px"> <input type="text" id="topic-input-${s.key}" placeholder="Yeni konu ekle..." style="flex:1"> <button class="btn btn-ghost" onclick="addTopic('${s.key}')" style="padding:8px 14px;font-size:0.8rem;border-color:${s.color};color:${s.color}">+ Ekle</button> </div> </div>`).join(’’);
S.forEach(s=>renderTopicList(s.key));
}

function renderTopicList(key){
const d = load();
const s = S.find(x=>x.key===key);
const el = document.getElementById(`topics-${key}`);
if(!el) return;
const topics = […d.topics[key]].sort((a,b)=>(b.count||1)-(a.count||1));
if(!topics.length){ el.innerHTML=`<div class="empty" style="padding:16px"><p>Henüz konu yok</p></div>`; return; }
el.innerHTML = topics.map((t,i)=>`<div class="topic-item ${t.done?'done':''}" style="--color:${s.color};--color-dim:${s.dim}" onclick="toggleTopic('${key}',${i})"> <span class="topic-count" style="background:${s.color}15;color:${s.color}">${t.count||1}x</span> <span class="topic-name">${t.text}</span> <span class="topic-check">${t.done?'✓':''}</span> <button class="btn btn-danger" onclick="event.stopPropagation();deleteTopic('${key}',${i})" style="padding:3px 8px;font-size:0.65rem">✕</button> </div>`).join(’’);
}

function addTopic(key){
const inp = document.getElementById(`topic-input-${key}`);
const text = inp.value.trim();
if(!text) return;
const d = load();
const existing = d.topics[key].find(t=>t.text.toLowerCase()===text.toLowerCase());
if(existing){ existing.count=(existing.count||1)+1; }
else{ d.topics[key].push({text,count:1,done:false,id:Date.now()}); }
inp.value=’’;
save(d);
renderTopicList(key);
}

function toggleTopic(key,idx){
const d = load();
const sorted = […d.topics[key]].sort((a,b)=>(b.count||1)-(a.count||1));
const item = sorted[idx];
const orig = d.topics[key].find(t=>t.id===item.id);
if(orig) orig.done = !orig.done;
save(d);
renderTopicList(key);
}

function deleteTopic(key,idx){
const d = load();
const sorted = […d.topics[key]].sort((a,b)=>(b.count||1)-(a.count||1));
const item = sorted[idx];
d.topics[key] = d.topics[key].filter(t=>t.id!==item.id);
save(d);
renderTopicList(key);
}

// ── HEDEFLER ────────────────────────────────────────────────────────────────
function renderHedef(){
const d = load();
const entries = d.entries;
document.getElementById(‘goals-display’).innerHTML = S.map(s=>{
const nets = entries.map(e=>e[s.key]?.net).filter(n=>n!=null);
const lastNet = nets.length ? nets[nets.length-1] : 0;
const goal = d.goals[s.key]||0;
const pct = goal>0 ? Math.min(100,Math.round((lastNet/goal)*100)) : 0;
const diff = (goal - lastNet).toFixed(1);
return `<div class="goal-item" style="--color:${s.color}"> <div class="goal-header"> <span class="goal-subject">${s.label}</span> <span class="goal-nums">Son: <span>${lastNet?lastNet.toFixed(1):'—'}</span> / Hedef: <span>${goal}</span></span> </div> <div class="goal-bar-track"><div class="goal-bar-fill" style="width:${pct}%;background:${s.color}"></div></div> <div class="goal-status">${pct>=100?'🎉 Hedefe ulaştın!':lastNet?`Hedefe ${diff} net kaldı (%${pct})`:'Henüz deneme yok'}</div> </div>`;
}).join(’’);
}

function saveGoals(){
const d = load();
S.forEach(s=>{ d.goals[s.key] = +document.getElementById(`goal-${s.key}`).value||0; });
save(d);
toast(‘✓ Hedefler kaydedildi!’);
renderHedef();
}

});

// ── GEÇMİŞ ──────────────────────────────────────────────────────────────────
function renderGecmis(){
const d = load();
const entries = […d.entries].reverse();
const el = document.getElementById(‘history-table’);
if(!entries.length){ el.innerHTML=’<div class="empty"><div class="empty-icon">📭</div><p>Deneme kaydı yok</p></div>’; return; }

el.innerHTML = `<table> <thead><tr> <th>Tarih</th> ${S.map(s=>`<th style="color:${s.color}">${s.short}</th>`).join('')} <th>Toplam</th><th>Yanlış Konular</th><th></th> </tr></thead> <tbody> ${entries.map(e=>{ const total = S.reduce((acc,s)=>acc+(e[s.key]?.net||0),0); const pillCls = total>=85?'pill-good':total>=60?'pill-ok':'pill-bad'; const wrongs = S.map(s=>{ const w = e[s.key]?.wrong; return w ? `<span style="color:${s.color};font-size:0.72rem">${s.short}: ${w}</span>`: ''; }).filter(Boolean).join(' · '); return`<tr>
<td><span style="font-size:0.8rem">${fmtDate(e.date)}</span>${e.name?`<br><span style="font-size:0.7rem;color:var(--muted)">${e.name}</span>`:’’}</td>
${S.map(s=>{
const net = e[s.key]?.net;
const c = net>=s.max*0.7?’#3ddc97’:net>=s.max*0.4?’#ffb340’:’#ff5c6a’;
return `<td><span class="pill" style="background:${c}18;color:${c}">${net!=null?net.toFixed(1):'—'}</span></td>`;
}).join(’’)}
<td><span class="pill ${pillCls}">${total.toFixed(1)}</span></td>
<td style="max-width:160px;font-size:0.72rem;color:var(--muted)">${wrongs||’—’}</td>
<td><button class="btn btn-danger" onclick="deleteEntry(${e.id})">✕</button></td>
</tr>`;
}).join(’’)}
</tbody>

  </table>`;
}

function deleteEntry(id){
const d = load();
d.entries = d.entries.filter(e=>e.id!==id);
save(d);
renderGecmis();
renderDash();
toast(‘Kayıt silindi’);
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function fmtDate(dt){
const d = new Date(dt+‘T12:00:00’);
return d.toLocaleDateString(‘tr-TR’,{day:‘2-digit’,month:‘short’});
}

function getLast7Dates(){
const dates=[];
for(let i=6;i>=0;i–){
const d=new Date(); d.setDate(d.getDate()-i);
dates.push(d.toISOString().split(‘T’)[0]);
}
return dates;
}

function getLast14Dates(){
const dates=[];
for(let i=13;i>=0;i–){
const d=new Date(); d.setDate(d.getDate()-i);
dates.push(d.toISOString().split(‘T’)[0]);
}
return dates;
}

function toast(msg){
const el=document.getElementById(‘toast’);
el.textContent=msg; el.classList.add(‘show’);
setTimeout(()=>el.classList.remove(‘show’),2200);
}

function confetti(){
const colors=[’#3ddc97’,’#ff5c6a’,’#ffb340’,’#58b4ff’,’#fff’];
for(let i=0;i<40;i++){
setTimeout(()=>{
const el=document.createElement(‘div’);
el.className=‘confetti-piece’;
el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1+Math.random()}s;transform:rotate(${Math.random()*360}deg)`;
document.body.appendChild(el);
setTimeout(()=>el.remove(),2000);
},i*40);
}
toast(‘🎉 Hedefe ulaştın!’);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
buildForms();
renderDash();
</script>
